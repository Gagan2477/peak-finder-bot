<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeakFinder Chat UI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 600px; height: 85vh; background-color: #181825; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #313244; }
        .chat-header { background-color: #cba6f7; color: #11111b; padding: 15px 20px; font-size: 1.2rem; font-weight: bold; text-align: center; }
        .chat-messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 8px; line-height: 1.4; }
        .message.bot { background-color: #313244; color: #cdd6f4; align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.user { background-color: #cba6f7; color: #11111b; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        .message.error { background-color: #f38ba8; color: #11111b; align-self: flex-start; }
        .chat-input-area { display: flex; padding: 15px; background-color: #181825; border-top: 1px solid #313244; }
        input[type="text"] { flex-grow: 1; padding: 12px 15px; border: 1px solid #45475a; border-radius: 6px; background-color: #1e1e2e; color: #cdd6f4; outline: none; }
        button { background-color: #cba6f7; color: #11111b; border: none; padding: 0 20px; margin-left: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🏔️ PeakFinder AI Assistant</div>
        <div class="chat-messages" id="chatWindow">
            <div class="message bot">System initialized. Ready for data.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type a command..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const inputField = document.getElementById("userInput");
        const chatWindow = document.getElementById("chatWindow");

        inputField.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            addMessageToChat("user", text);
            inputField.value = ""; 
            
            const thinkingId = "thinking-" + Date.now();
            addMessageToChat("bot", "...", thinkingId);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                document.getElementById(thinkingId).remove();
                addMessageToChat("bot", data.reply || "No reply generated.");
                
            } catch (error) {
                document.getElementById(thinkingId).remove();
                addMessageToChat("error", "Frontend Error: " + error.message);
            }
        }

        function addMessageToChat(sender, text, id = null) {
            const div = document.createElement("div");
            div.className = "message " + sender;
            if (id) div.id = id;
            div.innerHTML = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
